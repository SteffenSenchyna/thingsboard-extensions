<div [class.dark]="darkMode" class="shelter-dashboard">

  <!-- Header: tab bar + Thresholds action -->
  <div class="shelter-header">
    <div class="shelter-header-row">
      <nav class="shelter-tabs">
        <button (click)="selectTab(tab.id)"
                *ngFor="let tab of tabs"
                [class.active]="activeTab === tab.id"
                class="shelter-tab"
                type="button">
          <mat-icon>{{ tab.icon }}</mat-icon>
          <span>{{ tab.label }}</span>
        </button>
      </nav>

      <div class="shelter-header-actions">
        <!-- Time frame selector (controls the Water Consumption aggregation). -->
        <tb-timeframe-selector [options]="timeframeOptions" [selected]="timeframe"
                               (selectedChange)="setTimeframe($event)"></tb-timeframe-selector>
        <tb-theme-toggle [dark]="darkMode" (toggled)="toggleTheme()"></tb-theme-toggle>
      </div>
    </div>
  </div>

  <!-- Overview tab — kept in the DOM (hidden, not destroyed) so the Leaflet
       map instance survives tab switches. -->
  <div [style.display]="activeTab === 'overview' ? 'grid' : 'none'" class="shelter-grid">

    <!-- Left column: map + devices -->
    <div class="col col-left">

      <!-- Map -->
      <tb-map-card title="Map" [locations]="deviceLocations" [dark]="darkMode" [mapType]="mapType"
                   (mapTypeChange)="onMapTypeChange($event)"></tb-map-card>

      <!-- Sites (assets of type Site related to a Milesight-EM300-DI device) -->
      <tb-data-table title="Sites" icon="location_city"
                     [columns]="sitesColumns" [rows]="sitesRows" [loading]="sitesLoading"
                     [showColumnHeaders]="false" [actions]="sitesActions" (actionClick)="onSitesAction($event)"
                     emptyText="No sites found" loadingText="Loading sites…"
                     searchPlaceholder="Search sites">
      </tb-data-table>
    </div>

    <!-- Right column: charging + alarms -->
    <div class="col col-right">

      <!-- Water-consumption trend (single device meterReadingDelta) -->
      <tb-trend-chart icon="water_drop" [title]="tickerSymbol" [unit]="tickerUnit"
                      [data]="tickerSeries" [loading]="tickerLoading" [dark]="darkMode"></tb-trend-chart>

      <!-- Alarms -->
      <tb-data-table title="Alarms" icon="notifications"
                     [columns]="alarmColumns" [rows]="alarmsRows" [loading]="alarmsLoading"
                     [showColumnHeaders]="false" [searchKeys]="['searchText']"
                     emptyText="No alarms" loadingText="Loading alarms…"
                     searchPlaceholder="Search alarms">
        <ng-template tbDataTableCell="alarm" let-row>
          <div class="alarm-cell">
            <div class="alarm-title">{{ row.type }}</div>
            <div class="alarm-meta">
              <span class="severity-bar" [ngClass]="severityClass(row.severity)"
                    [matTooltip]="severityLabel(row.severity)">
                <span class="seg" [class.on]="severityRank(row.severity) >= 1"></span>
                <span class="seg" [class.on]="severityRank(row.severity) >= 2"></span>
                <span class="seg" [class.on]="severityRank(row.severity) >= 3"></span>
                <span class="seg" [class.on]="severityRank(row.severity) >= 4"></span>
              </span>
              <span class="alarm-date">{{ row.createdTime | date: "MMM d 'at' HH:mm" }}</span>
              <span class="alarm-meta-divider"></span>
              <span class="alarm-device">{{ row.originatorName }}</span>
            </div>
          </div>
        </ng-template>
      </tb-data-table>
    </div>
  </div>

  <!-- Placeholder tabs -->
  <div *ngIf="activeTab === 'analytics'" class="shelter-placeholder">
    <mat-icon>show_chart</mat-icon>
    <span>Analytics</span>
  </div>
  <div *ngIf="activeTab === 'users'" class="shelter-placeholder">
    <mat-icon>group</mat-icon>
    <span>Users</span>
  </div>
</div>
